name: Release from main

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  actions: write
  contents: write

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release tag
        id: version
        run: |
          tag="$(node -p '"v" + require("./package.json").version')"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Check existing tag
        id: tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.version.outputs.tag }} already exists; skipping release dispatch."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and dispatch release
        if: steps.tag.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release logister-js ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh workflow run release.yml --ref "${{ steps.version.outputs.tag }}"
