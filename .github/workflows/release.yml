name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          node <<'NODE'
          const packageJson = require("./package.json");
          const expectedTag = `v${packageJson.version}`;
          const actualTag = process.env.GITHUB_REF_NAME;

          if (actualTag !== expectedTag) {
            console.error(`Tag ${actualTag} does not match package.json version ${expectedTag}.`);
            process.exit(1);
          }
          NODE

      - name: Run checks
        run: npm run check

      - name: Check npm package version
        id: npm_package
        run: |
          version="${GITHUB_REF_NAME#v}"
          if npm view "logister-js@${version}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "logister-js@${version} already exists on npm."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "logister-js@${version} is not published on npm yet."
          fi

      - name: Publish package with npm trusted publishing
        if: steps.npm_package.outputs.exists != 'true'
        run: npm publish --access public

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build release notes from changelog
        id: release_notes
        run: |
          ruby <<'RUBY' > "$GITHUB_OUTPUT"
          changelog_path = "CHANGELOG.md"
          config_path = "config/release.yml"
          tag = ENV.fetch("GITHUB_REF_NAME")

          abort("Missing #{changelog_path}") unless File.exist?(changelog_path)
          abort("Missing #{config_path}") unless File.exist?(config_path)

          current_header = nil
          body_lines = []
          found = false

          File.readlines(changelog_path, chomp: true).each do |line|
            if line.start_with?("## ")
              break if found

              current_header = line.sub(/\A##\s+/, "")
              found = current_header.start_with?(tag)
              next
            end

            body_lines << line if found
          end

          abort("Could not find release notes for #{tag} in #{changelog_path}") unless found

          body = body_lines.join("\n").strip
          body = "Release #{tag}" if body.empty?

          puts "name=#{current_header}"
          puts "body<<EOF"
          puts body
          puts "EOF"
          RUBY

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "${{ steps.release_notes.outputs.name }}" \
              --notes "${{ steps.release_notes.outputs.body }}" \
              --latest
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "${{ steps.release_notes.outputs.name }}" \
              --notes "${{ steps.release_notes.outputs.body }}" \
              --latest
          fi
