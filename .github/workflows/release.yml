name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build release notes from changelog
        id: release_notes
        run: |
          ruby <<'RUBY' > "$GITHUB_OUTPUT"
          changelog_path = "CHANGELOG.md"
          config_path = "config/release.yml"
          tag = ENV.fetch("GITHUB_REF_NAME")

          abort("Missing #{changelog_path}") unless File.exist?(changelog_path)
          abort("Missing #{config_path}") unless File.exist?(config_path)

          current_header = nil
          body_lines = []
          found = false

          File.readlines(changelog_path, chomp: true).each do |line|
            if line.start_with?("## ")
              break if found

              current_header = line.sub(/\A##\s+/, "")
              found = current_header.start_with?(tag)
              next
            end

            body_lines << line if found
          end

          abort("Could not find release notes for #{tag} in #{changelog_path}") unless found

          body = body_lines.join("\n").strip
          body = "Release #{tag}" if body.empty?

          puts "name=#{current_header}"
          puts "body<<EOF"
          puts body
          puts "EOF"
          RUBY

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "${{ steps.release_notes.outputs.name }}" \
              --notes "${{ steps.release_notes.outputs.body }}" \
              --latest
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "${{ steps.release_notes.outputs.name }}" \
              --notes "${{ steps.release_notes.outputs.body }}" \
              --latest
          fi
